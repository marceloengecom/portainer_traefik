####################################################################################################################################
#
# Substitua as variáveis ${LETSENCRYPT_EMAIL}, ${TRAEFIK_DOMAIN}, ${DOCKER_NETWORK} e ${HASH_TRAEFIK} pelos valores correspondentes.
# O acesso ao web ui do Traefik pode ser feito em: https://${TRAEFIK_DOMAIN}/dashboard/
#
# docker stack deploy --prune --resolve-image always -c traefik.yaml traefik
####################################################################################################################################

services:

  traefik:
    image: traefik:v3.6.12
    command:
      # Dashboard
      - "--api.dashboard=true"
      - "--api.insecure=false"
      
      # Swarm provider
      - "--providers.swarm=true"
      - "--providers.swarm.endpoint=unix:///var/run/docker.sock"
      - "--providers.swarm.exposedbydefault=false"
      - "--providers.swarm.network=${DOCKER_NETWORK}"

      # EntryPoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"

      # Redirecionamento HTTP para HTTPS
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
            
      # Timeouts WebSocket. Obrigatorio para ligacoes persistentes (OpenClaw, n8n).
      # readtimeout=0 e writetimeout=0 desactivam o limite de tempo.
      # idletimeout=3600 encerra ligacoes inactivas ao fim de 1 hora.
      - "--entrypoints.websecure.transport.respondingtimeouts.readtimeout=0"
      - "--entrypoints.websecure.transport.respondingtimeouts.writetimeout=0"
      - "--entrypoints.websecure.transport.respondingtimeouts.idletimeout=3600"
      
      # TLS e Let's Encrypt
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"      
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      
      - "--certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}"
      
      # Logs
      - "--log.level=DEBUG"
      - "--log.format=common"
      - "--log.filePath=/var/log/traefik/traefik.log"
      - "--accesslog=true"
      - "--accesslog.filepath=/var/log/traefik/access.log"

    volumes:
      - "traefik_certificates:/etc/traefik/letsencrypt"
      - "traefik_logs:/var/log/traefik"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - ${DOCKER_NETWORK}

    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host

    deploy:
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        
        - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"
        - "traefik.http.middlewares.redirect-https.redirectscheme.permanent=true"
                
        #######################################################
        # Dashboard por HTTPS (traefik.dominio.com)
        #######################################################
        - "traefik.http.routers.traefik.rule=Host(`${TRAEFIK_DOMAIN}`)"
        - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
        - "traefik.http.routers.traefik.entrypoints=websecure"
        - "traefik.http.routers.traefik.service=api@internal"

        # Serviço interno — OBRIGATÓRIO!
        - "traefik.http.services.traefik.loadbalancer.server.port=8080"

        # Autenticação para o dashboard do Traefik (opcional, mas recomendado)
        # Gerar hash: echo $(htpasswd -nb admin SENHA) | sed -e s/\\$/\\$\\$/g      
        - "traefik.http.routers.traefik.middlewares=auth"
        - "traefik.http.middlewares.auth.basicauth.users=${HASH_TRAEFIK}"        
        

volumes:
  traefik_certificates:
    external: true
    name: traefik_certificates
  traefik_logs:
    external: true
    name: traefik_logs

networks:
  ${DOCKER_NETWORK}: 
    external: true
    attachable: true
    name: ${DOCKER_NETWORK} 
